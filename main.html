<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="main.css">
</head>

<body>
    <div class='container'>
        <!-- 상단 -->
        <div class="header">
            <div class='header_text'>
                <p> Hello!</p>
                <h1>TOMORO</h1>
            </div>

            <button class='alarm'>
                <img src="images/alarm.png" alt="alarm">
            </button>
        </div>

        <!-- 퀘스트 진행률 -->
        <div class="quest">
            <div class='quest_left'>
                <div class='quest_text'>
                    <p>오늘의 퀘스트 진행률</p>
                </div>
                <div class='quest_btn'>
                    <button id='questbtn'>
                        <span>자세히 보기</span>
                    </button>
                </div>
            </div>
            <div class='progress_circle'>
                <svg width="105" height="105">
                    <circle class="bg" cx="52.5" cy="52.5" r="42.5"></circle>
                    <circle class="progress" cx="52.5" cy="52.5" r="42.5"></circle>
                </svg>
                <span id="progressText">85%</span>
            </div>
        </div>

        <!-- 모니터링 알림-->
        <div class="monitoring">
            <div class='monitoring_text'>
                <h2>모니터링 알림</h2>
                <span class='badge'>6</span>
            </div>
            <div class='monitor_list'>
                <div class='monitor_card'>
                    <p>마지막 활동</p>
                    <h3>거실 모션 감지</h3>
                </div>
                <div class='monitor_card'>
                    <p>낙상 감지</p>
                    <h3>0회</h3>
                </div>
            </div>
        </div>

        <!-- 주간 인지 능력 추이-->
        <div class='weekly'>
            <div class='weekly_text'>
                <h2>주간 인지 능력 추이</h2>
            </div>
            <div class='weekly_chart'>
                <canvas id="weeklychart"></canvas>
            </div>
        </div>

        <!--아래바-->
        <div class='bar'>
            <div class='home'>
                <button id='homebtn'>
                    <img src="images/home1.png" class="home" alt="home">
                </button>
            </div>
            <div class='alert'>
                <button id='alertbtn'>
                    <img src="images/alert.png" class="alert" alt="alert">
                </button>
            </div>
            <div class='setting'>
                <button id='settingbtn'>
                    <img src="images/setting.png" class="setting" alt="setting">
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="chart.js"></script>
    <script src="main.js"></script>
</body>

</html>
