<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="calendar.css">
</head>

<body>
    <div class="container">
        <!-- 상단 -->
        <div class="header">
            <button class="backbtn">
                <img src="images/back.png">
            </button>
            <h2>날짜 선택</h2>
            <button class="alarmbtn">
                <img src="images/alarm.png">
            </button>
        </div>

        <!-- 월 선택 -->
        <div class="month_bar">
            <button class="month_btn" id="prevBtn">
                <img src="images/left.png">
            </button>
            <h3 id="month"></h3>
            <button class="month_btn" id="nextBtn">
                <img src="images/right.png">
            </button>
        </div>

        <!-- 구분선 -->
        <hr>

        <!-- 요일 -->
        <div class="week">
            <span>일</span>
            <span>월</span>
            <span>화</span>
            <span>수</span>
            <span>목</span>
            <span>금</span>
            <span>토</span>
        </div>

        <!-- 달력 -->
        <div id="calendar" class='calendar'></div>

        <!-- 아래바 -->
        <div class="bar">

            <div class="home">
                <button id="homebtn">
                    <img src="images/home.png" alt="home">
                </button>
            </div>

            <div class="alarm">
                <button id="alertbtn">
                    <img src="images/alert1.png" alt="alarm">
                </button>
            </div>

            <div class="setting">
                <button id="settingbtn">
                    <img src="images/setting.png" alt="setting">
                </button>
            </div>

        </div>

    </div>
    <script src="calendar.js"></script>
</body>

</html>
