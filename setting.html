<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="setting.css">
</head>

<body>
        <div class='container'>
        <!-- 상단 -->
        <div class="header">

            <button class="backbtn">
                <img src="images/back.png" alt="back">
            </button>

            <h2>기기 및 설정</h2>
            <button class="alarmbtn">
                <img src="images/alarm.png" alt="alarm">
            </button>
        </div>

        <!-- 안내 -->
        <div class="notice">
            <h3>안전한 환경을 위해 기기 상태를 확인하세요.</h3>
            <p>실시간 연결 상태와 인지 케어 설정을 관리합니다.</p>
        </div>

        <!-- 연결된 기기 -->
        <div class="device">
            <p class="device_text">연결된 기기</p>
            <div class="device_card">
                <div class="device_left">
                    <div class="device_icon">
                        <img src="images/device.png" alt="device">
                    </div>
                    <div class="device_info">
                        <h3>CSI</h3>
                        <span class="connect">연결됨</span>
                    </div>
                </div>

                <button class="refreshbtn">
                    <img src="images/refresh.png" alt="refresh">
                </button>
            </div>

            <div class="device_card">
                <div class="device_left">
                    <div class="device_icon">
                        <img src="images/pen.png" alt="pen">
                    </div>

                    <div class="device_info">
                        <h3>스마트 펜</h3>
                        <span class="connect">연결됨</span>
                    </div>
                </div>

                <button class="refreshbtn">
                    <img src="images/refresh.png" class="refreshicon">
                </button>
            </div>
        </div>

        <!-- 테스트 및 감지 설정 -->
        <div class="test">
            <p class="device_text">테스트 및 감지 설정</p>
            <div class="setting_card">
                <div class="setting_item">
                    <h3>인지 테스트 주기</h3>
                    <p>사용자 패턴에 따른 정기 테스트 간격</p>
                    <div id="timeDefault">
                        <button class="select_btn" id="timeBtn">
                            <span id="selectedTime">매일 오전 10시</span>
                            <img src="images/down.png">
                        </button>
                    </div>

                    <!--시간선택 -->
                    <div class="time_picker" id="timePicker">
                        <div class="picker_box">
                            <div class="picker_column" id="hourCol"></div>
                            <span class="picker_sep">:</span>
                            <div class="picker_column" id="minuteCol"></div>
                            <span class="picker_sep">:</span>
                            <div class="picker_column" id="secondCol"></div>
                            <div class="picker_column" id="periodCol"></div>
                        </div>

                        <div class="picker_right">
                            <div class="cycle_box">
                                <button id="leftBtn" class="arrow_btn">
                                    <img src="images/left.png">
                                </button>
                                <span id="cycleText">매일</span>
                                <button id="rightBtn" class="arrow_btn">
                                    <img src="images/right.png">
                                </button>
                            </div>

                            <button id="confirmBtn" class="time_confirm">
                                확인
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 테스트 난이도 -->
                <div class="setting_item">
                    <div class="toggle_top">
                        <div>
                            <h3>테스트 난이도</h3>
                            <p>응답 속도에 따른 자동 난이도 조절</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="guide">
                    난이도 자동 조절 활성화 시 사용자의 최근 7일간 수행 데이터를<br>
                    분석하여 최적의 난이도의 테스트 문항을 제공합니다.
                </div>
            </div>

            <!-- 초기화 -->
            <button class="reset_btn">
                모든 설정 초기화
            </button>

            <!--아래바-->
            <div class='bar'>
                <div class='home'>
                    <button id='homebtn'>
                        <img src="images/home.png" class="home" alt="home">
                    </button>
                </div>
                <div class='alert'>
                    <button id='alertbtn'>
                        <img src="images/alert.png" class="alert" alt="alert">
                    </button>
                </div>
                <div class='setting'>
                    <button id='settingbtn'>
                        <img src="images/setting1.png" class="setting" alt="setting">
                    </button>
                </div>
            </div>
        </div>

        <script src="setting.js"></script>
</body>

</html>
